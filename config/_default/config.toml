# 站点
baseURL = 'http://localhost' # 请保证其链接完整性（即带有 htts://）
title = "亦幸小阁"
copyright = "版权所有"
languageCode = 'zh'
sectionPagesMenu = "main"

# 内容
defaultContentLanguage = 'zh'
hasCJKLanguage = true
enableEmoji = true
enableInlineShortcodes = true # Default value: false
enableGitInfo = true
paginate = 5


[related]
includeNewer = true
threshold = 20
toLower = false
[[related.indices]]
# Can be used as a front matter slice to link to other page fragments (headings) using their ID.
# This isn't particular useful in the current docs, but we're planning on getting a auto generated
# reference section with a better ID setup.
# For now, we just use it to give pages with same headings some similarity score.
name = "fragmentrefs"
type = "fragments"
applyFilter = false
weight = 60
cardinalityThreshold = 50
[[related.indices]]
name = 'tags'
type = 'fragments'
weight = 40
[[related.indices]]
name = 'categories'
type = 'fragments'
weight = 50
[[related.indices]]
name = "date"
weight = 30


# 主题

# Hugo Module:
#      hugo mod get -u
[module]
proxy = 'https://goproxy.cn'
