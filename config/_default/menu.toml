# 注意，官方的是在 pre 中使用 html 标签的方式实现菜单图标，
# 这里我们使用类或者 UnoCSS 的属性来实现，你可以在 https://icones.js.org/ 中找到你

[[main]]
name = "Note"
identifier = "log"        # 标识符，用于翻译
pre = 'i-gridicons:posts' # 图标（可选）
pageRef = "/log"
title = "日志"
weight = 2
[[main]]
name = "Note"
identifier = "note"        # 标识符，用于翻译
pre = 'i-material-symbols:edit-note-sharp' # 图标（可选）
pageRef = "/note"
title = "笔记"
weight = 2
[[main]]
name = "about"
title = "关于"
identifier = "about"              # 标识符，用于翻译
pre = 'i-mdi-about-circle-outline' # 图标（可选）
pageRef = "/about"
weight = 0

[[footer]]
title="Github"
name="Github"
pre = 'i-simple-icons:github'
url = 'https://github.com/hencter/'
weight = 0
[[footer]]
title="Gitee"
name="Gitee"
pre = 'i-simple-icons:gitee text-#DA0000'
url = 'https://gitee.com/hencter'
weight = 1
[[footer]]
title="Hugo"
name="Hugo"
pre = 'i-logos-hugo w21'
url = 'https://gohugo.io/'
weight = 2
