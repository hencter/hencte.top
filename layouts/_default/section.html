{{ define "main" }}
<main id="main">
  <header>
    {{ partial "breadcrumb.html" . }}
  </header>
  {{ with .Content }}
    <article>
      {{ . }}
    </article>
  {{ end }}

  {{ range .Pages.GroupByDate "2006" }}

  <section>
    <h2>
      <span>{{ .Key }}</span>
    </h2>
    {{ range .Pages }}
    {{ .Render "summary"}}
    {{ end }}
    </ul>
  </section>

  {{ end }}

</main>
{{ end }}
