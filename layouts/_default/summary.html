<article relative mt-5 shadow bg="white op10" dark:bg="black op20 shadow-2xl" rd-2 p2 active:scale-96>
  <header>
    <h3 id="{{.Title}}">
      {{- .Title -}}
      {{ if .Site.IsServer }}
      {{- if .Draft }}<sup><span text-rose>&nbsp;&nbsp;[草稿]</span></sup>{{- end }}
      {{ end }}
    </h3>
    <p>
      <time>
        {{- .Date | time.Format ":date_full" -}}
      </time>

    </p>
  </header>
  <p break-all>
    {{ .Summary }}···
  </p>
  <a absolute left-0 right-0 top-0 bottom-0px href="{{.Permalink}}" title="{{ .Params.Description }}"></a>
</article>
