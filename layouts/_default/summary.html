<article>
  <header>
    <h3 id="{{ .Title }}">
      <a>
        {{- .Title -}}
        {{ if .Site.IsServer }}
          {{- if .Draft }}<sup><span>&nbsp;&nbsp;[草稿]</span></sup>{{- end }}
        {{ end }}
      </a>
    </h3>
    <p>
      <time>
        {{- .Date | time.Format ":date_full" -}}
      </time>
    </p>
  </header>
  <p break-all>
    {{ .Summary }}
  </p>
  {{ if .Truncated }}
    <div>
      <a href="{{ .RelPermalink }}">阅读更多...</a>
    </div>
  {{ end }}
</article>
