{{ define "main" }}
<main id="main" px-10 py-10>
  <section id="taxonomies" m-a xl-flex>
    {{ range $taxonomy_term, $taxonomy := .Site.Taxonomies }}
    <div id="{{$taxonomy_term}}">
      {{ with $.Site.GetPage (printf "/%s" $taxonomy_term) }}
      <h2 text-center>
        <a class='decoration-none text-dark dark:text-light op50' href="{{$taxonomy_term | absURL}}">{{ i18n
          $taxonomy_term }}</a>
      </h2>

      <div flex flex-wrap gap-4 justify-center>
        {{ range $key, $value := $taxonomy }}
        <a decoration-none p-1 rd-1 op50 hover:transform-scale-150 text-{{.Count}}xl text-dark-{{.Count}}
          bg-stone-{{.Count}} dark:bg-light-{{.Count}}00 dark:c-light-{{.Count}}
          href="{{ $taxonomy_term | absURL }}/{{ $key }}">
          <span>
            {{ .Page.Title }}
            <sup text-dark-{{.Count}} dark:text-light{{.Count}}>{{- .Count -}}</sup>
          </span>
        </a>
        {{ end }}
      </div>
      {{ end }}
    </div>
    {{ end }}
  </section>
</main>
{{ end }}
