{{/* 对内置内容的 CSS 处理 */}}
{{ $main := resources.Get "scss/main.scss"}}
{{ $style := $main | resources.ToCSS }}
<link rel="stylesheet" href="{{ $style.RelPermalink }}" {{ if hugo.IsProduction }}
    integrity="{{ $style.Data.Integrity }}" {{ end }} />

{{/* unocss 需要 @unocss/cli 为模版文件生成 css 文件 */}}
{{ $unocss := resources.Get "css/uno.css" }}
<link rel="stylesheet" href="{{ $unocss.RelPermalink }}" {{ if hugo.IsProduction }}
    integrity="{{ $unocss.Data.Integrity }}" {{ end }} />

{{/* JS */}}
{{ $index := resources.Get "js/main.js" | js.Build "index.js" |
resources.Minify }}
<script src="{{- $index.RelPermalink -}}" defer></script>
